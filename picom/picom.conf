#################################
#      Backend & General        #
#################################

backend = "glx";
vsync = true;

# Better performance & fewer glitches
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Disable compositor on fullscreen
unredir-if-possible = true;

################################
#        Rounded Corners       #
################################

corner-radius = 18;

################################
#           Shadows            #
################################

shadow = true;
shadow-opacity = 0.7;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'dwm'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c",
  "name = 'NotificationArea'",
  "class_g = 'Dunst'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

shadow-ignore-shaped = true;

################################
#         Transparency         #
################################

inactive-opacity = 0.75;
active-opacity = 1.0;
inactive-opacity-override = true;
menu-opacity = 0.95;

opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'URxvt'",
  "80:class_g = 'Spotify'",
  "100:class_g = 'Firefox' && _NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

################################
#           Fading             #
################################

fading = true;
fade-delta = 5;
fade-in-step = 0.04;
fade-out-step = 0.04;

fade-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

################################
#          BLUR (ENABLED)      #
################################

# NOTE: Requires modern picom (yshui or forks)
blur:
{
  method = "dual_kawase";
  strength = 5;
};

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

################################
#         ANIMACIONES PRO 🔥    #
################################

animations = (

  # 🟢 OPEN (suave + zoom ligero)
  {
    triggers = [ "open" ];
    preset = "appear";
    duration = 0.35;
    scale = 0.95;
  },

  # 🔴 CLOSE (más elegante, no abrupto)
  {
    triggers = [ "close" ];
    preset = "disappear";
    duration = 0.3;
    scale = 0.95;
  },

  # ⬆️ SHOW (tipo Hyprland)
  {
    triggers = [ "show" ];
    preset = "slide-in";
    direction = "up";
    duration = 0.35;
  },

  # ⬇️ HIDE
  {
    triggers = [ "hide" ];
    preset = "slide-out";
    direction = "down";
    duration = 0.3;
  },

  # 🔄 CAMBIOS DE GEOMETRÍA (MUY IMPORTANTE)
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    duration = 0.25;
  }

);

################################
#        Window Detection      #
################################

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

################################
#        Performance           #
################################

use-damage = true;

# Optional (enable only if needed)
# log-level = "warn";
