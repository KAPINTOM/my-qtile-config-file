# ============================================
#  Alacritty Terminal - Beautiful Config
# ============================================
#  Theme: Custom Dracula (slightly adapted)
#  Font: CaskaydiaMono Nerd Font Bold
#  Window: Semi-transparent with Blur
# ============================================

# ---------------------------------
# 1. Theme & Colors (Dracula-based)
# ---------------------------------

[colors]
[colors.primary]
background = "#363a50"
foreground = "#f8f8f2"
dim_foreground = "#6272a4"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#282a36"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]
text = "#282a36"
cursor = "#bd93f9"

[colors.search]
matches = { foreground = "#44475a", background = "#50fa7b" }
focused_match = { foreground = "#44475a", background = "#ffb86c" }

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#282a36"
background = "#f8f8f2"

[colors.selection]
text = "#f8f8f2"
background = "#44475a"

[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"

[colors.dim]
black   = "#21222c"
red     = "#bf4040"
green   = "#3cbf5c"
yellow  = "#b5bf68"
blue    = "#8d6ebf"
magenta = "#bf5b94"
cyan    = "#68afbf"
white   = "#bfbfbf"

[colors.hints]
start = { foreground = "#282a36", background = "#f1fa8c" }
end   = { foreground = "#f1fa8c", background = "#282a36" }

# -----------------------------------------
# 2. Font & Typography (CaskaydiaMono Bold)
# -----------------------------------------

[font]
size = 7

[font.normal]
family = "CaskaydiaMono Nerd Font"
style = "Bold"

[font.bold]
family = "CaskaydiaMono Nerd Font"
style = "Bold"

[font.italic]
family = "CaskaydiaMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "CaskaydiaMono Nerd Font"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

# -----------------------------------
# 3. Window Appearance & Transparency
# -----------------------------------

[window]
opacity = 0.90
blur = true
dimensions = { columns = 120, lines = 35 }
padding = { x = 12, y = 12 }
dynamic_padding = true
decorations = "Full"
decorations_theme_variant = "Dark"
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true

# ----------------------------
# 4. Cursor Style
# ----------------------------

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 750
blink_timeout = 5
unfocused_hollow = true
thickness = 0.15

# ----------------------------
# 5. Keyboard Shortcuts
# ----------------------------

# (Optional) Add custom keybindings here.

# ----------------------------
# 6. Scrolling & History
# ----------------------------

[scrolling]
history = 10000
multiplier = 3

# ----------------------------
# 7. Mouse & Selection
# ----------------------------

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

# ----------------------------
# 8. Performance & Advanced
# ----------------------------

[debug]
log_level = "Warn"
render_timer = false
